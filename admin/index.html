            .post-content h3 { font-size: 1.4rem; }
            .post-content p { font-family: 'Plus Jakarta Sans', sans-serif; font-size: 0.875rem; line-height: 1.8; color: ${colors.muted}; margin-bottom: 1.5rem; }
            .post-content img { max-width: 100%; height: auto; border-radius: 16px; margin: 2rem 0; display: block; border: 1px solid ${colors.border}; }
            .post-content strong { color: ${colors.text}; font-weight: 800; }
            .post-content ul { list-style-type: square; margin-left: 1.5rem; margin-bottom: 1.5rem; color: ${colors.muted}; }
            .post-content ol { list-style-type: decimal; margin-left: 1.5rem; margin-bottom: 1.5rem; color: ${colors.muted}; }
            .post-content li { margin-bottom: 0.75rem; line-height: 1.7; }
            .post-content a { color: #3387a2; text-decoration: none; border-bottom: 1px dashed #3387a2; }
            .post-content blockquote { border-left: 3px solid #3387a2; padding-left: 1.5rem; margin: 2rem 0; font-style: italic; color: ${colors.text}; }
          `),
          // Floating Theme Toggle Button
          h('button', {
            onClick: this.toggleTheme,
            style: {
              position: 'absolute',
              top: '20px',
              right: '20px',
              padding: '10px 16px',
              background: colors.btnBg,
              color: colors.text,
              border: '1px solid ' + colors.btnBorder,
              borderRadius: '10px',
              cursor: 'pointer',
              fontSize: '12px',
              fontWeight: 'bold',
              fontFamily: '"Plus Jakarta Sans", sans-serif',
              transition: 'all 0.3s ease'
            }
          }, theme === 'dark' ? '☀️ Light Mode' : '🌙 Dark Mode'),

          h('div', { style: { maxWidth: '768px', margin: '0 auto' } },
            h('span', { style: { fontSize: '9px', fontWeight: '900', color: colors.muted, letterSpacing: '0.12em', textTransform: 'uppercase', display: 'block', marginBottom: '2rem' } }, '← Back to Blog'),
            h('h1', { style: { fontSize: '2.5rem', fontWeight: '900', color: colors.text, marginBottom: '1.5rem', lineHeight: '1.2', fontFamily: '"Outfit", sans-serif' } }, title),
            formattedDate ? h('div', { style: { fontSize: '10px', fontWeight: '700', color: colors.muted, textTransform: 'uppercase', letterSpacing: '0.08em', marginBottom: '2rem' } }, formattedDate) : null,
            image ? h('div', { style: { aspectRatio: '16/9', width: '100%', borderRadius: '16px', overflow: 'hidden', marginBottom: '3rem', border: '1px solid ' + colors.border, boxShadow: theme === 'dark' ? '0 30px 60px rgba(0, 0, 0, 0.5)' : '0 30px 60px rgba(0, 0, 0, 0.1)' } },
              h('img', { src: image.toString(), style: { width: '100%', height: '100%', objectFit: 'cover' } })
            ) : null,
            h('article', { className: 'post-content', style: { color: colors.muted, fontSize: '0.875rem', lineHeight: '1.8' } }, body)
          )
        );
      }
    });

    // Register live preview for all collections
    CMS.registerPreviewTemplate("dmu", AddonPreview);
    CMS.registerPreviewTemplate("emu", AddonPreview);
    CMS.registerPreviewTemplate("routes", AddonPreview);
    CMS.registerPreviewTemplate("objects", AddonPreview);
    CMS.registerPreviewTemplate("car_trainset", AddonPreview);
    CMS.registerPreviewTemplate("special_unit", AddonPreview);
    CMS.registerPreviewTemplate("mesh", AddonPreview);
    CMS.registerPreviewTemplate("plugin", AddonPreview);
    CMS.registerPreviewTemplate("dependency", AddonPreview);
    CMS.registerPreviewTemplate("archive", AddonPreview);
    CMS.registerPreviewTemplate("blog", BlogPreview);
  </script>
</body>
